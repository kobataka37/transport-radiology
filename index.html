<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>放射線部門 PC端末</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyAGmEL7f0f-tluguX87xOOrPPetH3F4uSs",
      authDomain: "callsystemdatabase.firebaseapp.com",
      projectId: "callsystemdatabase",
      storageBucket: "callsystemdatabase.firebasestorage.app",
      messagingSenderId: "214007172640",
      appId: "1:214007172640:web:392c87463f7eeb08c87645"
    };

    const appId = 'callsystemdatabase-app';

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const INITIAL_PATIENTS = [
      { id: "1", name: "一宮 太郎", ward: "A病棟", examType: "CT(頭部)", baseExamType: "CT(頭部)", time: "10:00", status: "waiting", delayedMinutes: null, repliedAt: null, note: "", callType: null, scheduledTime: null },
      { id: "2", name: "佐藤 花子", ward: "B病棟", examType: "MRI(腰椎)", baseExamType: "MRI(腰椎)", time: "10:30", status: "waiting", delayedMinutes: null, repliedAt: null, note: "", callType: null, scheduledTime: null },
      { id: "3", name: "鈴木 一郎", ward: "A病棟", examType: "CT(胸部)", baseExamType: "CT(胸部)", time: "11:00", status: "waiting", delayedMinutes: null, repliedAt: null, note: "", callType: null, scheduledTime: null },
      { id: "4", name: "高橋 健太", ward: "C病棟", examType: "XP(胸部)", baseExamType: "XP(胸部)", time: "11:15", status: "waiting", delayedMinutes: null, repliedAt: null, note: "", callType: null, scheduledTime: null },
      { id: "5", name: "伊藤 美咲", ward: "A病棟", examType: "CT(腹部)", baseExamType: "CT(腹部)", time: "11:30", status: "waiting", delayedMinutes: null, repliedAt: null, note: "", callType: null, scheduledTime: null },
    ];

    function App() {
      const [patients, setPatients] = useState([]);
      const [currentTime, setCurrentTime] = useState(new Date());
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [connError, setConnError] = useState(null);
      const [setupSuccess, setSetupSuccess] = useState(false);

      const [showLocationModal, setShowLocationModal] = useState(false);
      const [activePatientId, setActivePatientId] = useState(null);
      const [activeExamCategory, setActiveExamCategory] = useState('');
      const [modalStep, setModalStep] = useState(1);
      const [selectedLocation, setSelectedLocation] = useState('');
      const [customCallTime, setCustomCallTime] = useState('');

      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 60000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        auth.signInAnonymously()
          .then((cred) => {
            setUser(cred.user);
            setLoading(false);
          })
          .catch((err) => {
            setConnError("匿名認証に失敗しました。");
            setLoading(false);
          });
      }, []);

      useEffect(() => {
        if (!user) return;
        const patientsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('patients');
        const unsubscribe = patientsRef.onSnapshot(
          (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            setPatients(list);
          },
          (error) => {
            setConnError("データベース接続エラーが発生しました。");
          }
        );
        return () => unsubscribe();
      }, [user]);

      const setupDemoData = async () => {
        if (!user) return;
        try {
          const patientsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('patients');
          for (const p of INITIAL_PATIENTS) {
            await patientsRef.doc(p.id).set({ ...p, updatedAt: new Date().toISOString() });
          }
          setSetupSuccess(true);
          setTimeout(() => setSetupSuccess(false), 3000);
        } catch (err) {
          setConnError("デモデータの復元に失敗しました。");
        }
      };

      const formatTime = (date) => {
        return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
      };

      const addMinutesToTimeStr = (timeStr, mins) => {
        const [h, m] = timeStr.split(':').map(Number);
        const date = new Date();
        date.setHours(h);
        date.setMinutes(m + mins);
        return formatTime(date);
      };

      const handleInitialCallClick = (patient) => {
        const isCT = patient.baseExamType.includes('CT');
        const isMRI = patient.baseExamType.includes('MRI');
        setActivePatientId(patient.id);
        setModalStep(1);
        setSelectedLocation('');
        setCustomCallTime('');
        if (isCT) {
          setActiveExamCategory('CT');
          setShowLocationModal(true);
        } else if (isMRI) {
          setActiveExamCategory('MRI');
          setShowLocationModal(true);
        } else {
          setActiveExamCategory('OTHER');
          setModalStep(2);
          setShowLocationModal(true);
        }
      };

      const handleSelectLocation = (location) => {
        setSelectedLocation(location);
        setModalStep(2);
      };

      const submitCall = async (callType, val = null) => {
        const patient = patients.find(p => p.id === activePatientId);
        if (!patient) return;

        let updatedExamType = patient.baseExamType;
        if (selectedLocation) updatedExamType = `${patient.baseExamType} [${selectedLocation}]`;

        const nowStr = formatTime(new Date());
        let schedTime = null;
        if (callType === 'scheduled') {
          schedTime = (typeof val === 'number') ? addMinutesToTimeStr(nowStr, val) : val;
        }

        const patientsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('patients');
        await patientsRef.doc(activePatientId).set({
          status: 'called',
          examType: updatedExamType,
          note: "",
          callType: callType,
          scheduledTime: schedTime,
          delayedMinutes: null,
          delayedTime: null,
          delayType: null,
          repliedAt: null,
          updatedAt: new Date().toISOString()
        }, { merge: true });

        setShowLocationModal(false);
        setActivePatientId(null);
      };

      const updateStatus = async (id, newStatus, payload = {}) => {
        const patientsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('patients');
        const patient = patients.find(p => p.id === id);
        if (!patient) return;

        const resetExamType = (newStatus === 'waiting') ? patient.baseExamType : patient.examType;

        await patientsRef.doc(id).set({
          status: newStatus,
          examType: resetExamType,
          note: payload.note !== undefined ? payload.note : (newStatus === 'called' ? "" : patient.note),
          callType: newStatus === 'waiting' ? null : patient.callType,
          scheduledTime: newStatus === 'waiting' ? null : patient.scheduledTime,
          updatedAt: new Date().toISOString()
        }, { merge: true });
      };

      if (loading) {
        return <div className="p-8 text-center text-gray-500">起動中...</div>;
      }

      return (
        <div className="p-4 max-w-5xl mx-auto">
          {connError && <div className="bg-red-500 text-white p-3 rounded mb-4 font-bold">{connError}</div>}
          <div className="bg-blue-800 text-white p-4 rounded-t-xl flex justify-between items-center shadow-md">
            <h2 className="text-lg font-bold">🖥️ 放射線部門 PC端末</h2>
            <button onClick={setupDemoData} className="bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-xs font-bold">デモ復元</button>
          </div>
          <div className="bg-white p-4 rounded-b-xl shadow-lg border border-gray-200">
            <table className="w-full text-left border-collapse text-sm">
              <thead>
                <tr className="bg-gray-100 text-gray-600">
                  <th className="p-2 border">予定</th>
                  <th className="p-2 border">患者名</th>
                  <th className="p-2 border">病棟</th>
                  <th className="p-2 border">検査項目</th>
                  <th className="p-2 border">病棟からの応答</th>
                  <th className="p-2 border text-center">操作</th>
                </tr>
              </thead>
              <tbody>
                {patients.filter(p => p.status !== 'completed').map(p => (
                  <tr key={p.id} className="hover:bg-gray-50">
                    <td className="p-2 border font-mono">{p.time}</td>
                    <td className="p-2 border font-bold">
                      {p.name}
                      {p.note && <span className="block text-[10px] bg-red-100 text-red-800 px-1 rounded font-bold mt-1">再調整中: {p.note}</span>}
                    </td>
                    <td className="p-2 border">{p.ward}</td>
                    <td className="p-2 border">{p.examType}</td>
                    <td className="p-2 border font-bold">
                      {p.status === 'waiting' && <span className="text-gray-400">待機中</span>}
                      {p.status === 'called' && <span className="text-red-500 animate-pulse">確認中...</span>}
                      {p.status === 'ready' && <span className="text-green-600">すぐ搬送可 ({p.repliedAt})</span>}
                      {p.status === 'delayed' && <span className="text-yellow-600">{p.delayType === 'time' ? `${p.delayedTime}` : `${p.delayedMinutes}分後`}搬送可 ({p.repliedAt})</span>}
                      {p.status === 'unavailable' && <span className="text-red-700">対応不可</span>}
                      {p.status === 'transfer_requested' && <span className="text-purple-600">搬送指示済</span>}
                    </td>
                    <td className="p-2 border text-center">
                      {p.status === 'waiting' && (
                        <button onClick={() => handleInitialCallClick(p)} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-xs font-bold">搬送依頼</button>
                      )}
                      {['ready', 'delayed'].includes(p.status) && (
                        <button onClick={() => updateStatus(p.id, 'transfer_requested')} className="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded text-xs font-bold">最終搬送指示</button>
                      )}
                      {p.status === 'transfer_requested' && (
                        <button onClick={() => updateStatus(p.id, 'completed')} className="bg-gray-600 hover:bg-gray-700 text-white px-3 py-1 rounded text-xs font-bold">完了にする</button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {showLocationModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
              <div className="bg-white rounded-lg shadow-xl p-6 max-w-sm w-full">
                {modalStep === 1 ? (
                  <div>
                    <h3 className="font-bold text-center mb-4">搬送先を選択</h3>
                    <div className="grid grid-cols-2 gap-2">
                      {activeExamCategory === 'CT' ? (
                        <>
                          <button onClick={() => handleSelectLocation('南館1階')} className="p-3 bg-blue-100 hover:bg-blue-200 text-blue-900 font-bold rounded">南館 1階</button>
                          <button onClick={() => handleSelectLocation('南館地下')} className="p-3 bg-blue-100 hover:bg-blue-200 text-blue-900 font-bold rounded">南館 地下</button>
                        </>
                      ) : (
                        <>
                          <button onClick={() => handleSelectLocation('002室')} className="p-3 bg-emerald-100 hover:bg-emerald-200 text-emerald-900 font-bold rounded">002室</button>
                          <button onClick={() => handleSelectLocation('007室')} className="p-3 bg-emerald-100 hover:bg-emerald-200 text-emerald-900 font-bold rounded">007室</button>
                        </>
                      )}
                    </div>
                  </div>
                ) : (
                  <div>
                    <h3 className="font-bold text-center mb-4">打診時間を選択</h3>
                    <div className="space-y-2">
                      <button onClick={() => submitCall('immediate')} className="w-full p-2.5 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded">今すぐ搬送を打診</button>
                      <div className="grid grid-cols-3 gap-1">
                        <button onClick={() => submitCall('scheduled', 10)} className="p-2 bg-yellow-100 hover:bg-yellow-200 text-yellow-800 text-xs font-bold rounded">10分後</button>
                        <button onClick={() => submitCall('scheduled', 20)} className="p-2 bg-yellow-100 hover:bg-yellow-200 text-yellow-800 text-xs font-bold rounded">20分後</button>
                        <button onClick={() => submitCall('scheduled', 30)} className="p-2 bg-yellow-100 hover:bg-yellow-200 text-yellow-800 text-xs font-bold rounded">30分後</button>
                      </div>
                    </div>
                  </div>
                )}
                <button onClick={() => setShowLocationModal(false)} className="mt-4 w-full p-2 bg-gray-200 hover:bg-gray-300 rounded text-sm font-bold">閉じる</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
